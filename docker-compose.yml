version: '3.8'

services:
  # 数据库：时序数据库 TimescaleDB
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: ophanim_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  # 配置数据库：MySQL
  mysql:
    image: mysql:8.0
    container_name: ophanim_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql

  # MySQL 可视化：Adminer Web UI
  adminer:
    image: adminer:latest
    container_name: ophanim_adminer
    depends_on:
      - mysql
    ports:
      - "${ADMINER_PORT}:8080"

  # 数据库可视化：pgAdmin Web UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ophanim_pgadmin
    depends_on:
      - db
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin

  # 后端：仿真引擎 (Python + Skyfield)
  backend:
    build: ./backend
    container_name: ophanim_backend
    depends_on:
      - db
      - mysql
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - MYSQL_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ./backend:/app

  # 前端：3D 可视化 (Next.js + Three.js)
  frontend:
    build: ./frontend
    container_name: ophanim_frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # 关键：防止本地 node_modules 冲突
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000